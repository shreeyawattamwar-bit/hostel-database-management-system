<!DOCTYPE html>
<html>
<head>

<title>Hostel Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:900px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
padding:10px;
margin:5px;
}

button{
padding:8px 15px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#f4c27a;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.out-btn{
background:green;
color:white;
border:none;
}

.in-btn{
background:red;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Hostel Dashboard</h2>

<h3>Add Student</h3>

<input id="name" placeholder="Student Name">
<input id="mobile" placeholder="Mobile">
<input id="room" placeholder="Room No">

<button onclick="addStudent()">Add Student</button>


<h3>Search Student</h3>

<input
id="search"
placeholder="Search student..."
onkeyup="searchStudent()">


<table>

<thead>
<tr>
<th>ID</th>
<th>Details</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
