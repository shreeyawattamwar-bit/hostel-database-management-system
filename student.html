<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>
body{
font-family:Arial;
background:linear-gradient(to right,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
width:350px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2b7de9;
}
</style>

</head>

<body>

<div class="box">

<h2>Student Login</h2>

<form action="dashboard.html">

<input type="text" placeholder="Student ID" required>

<input type="password" placeholder="Password" required>

<button>Login</button>

</form>

</div>

</body>
</html>
