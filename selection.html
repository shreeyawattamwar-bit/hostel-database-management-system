<!DOCTYPE html>
<html>
<head>
<title>Hostel Management System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#ffcc70,#ff8177);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:40px;
border-radius:10px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button{
padding:12px 25px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:5px;
}

.admin{
background:#4CAF50;
color:white;
}

.student{
background:#2196F3;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>Hostel Management System</h2>

<p>Select Login Type</p>

<button class="admin"
onclick="window.location='dashboard.html'">
Hostel Admin Login
</button>

<button class="student"
onclick="window.location='studentlogin.html'">
Student Login
</button>

</div>

</body>
</html>
