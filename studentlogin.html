<!DOCTYPE html>
<html>
<head>

<title>Student Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#ff9966,#ff5e62);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#ff5e62;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<input id="student_id" placeholder="Student ID">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function login(){

const student_id=document.getElementById("student_id").value;
const password=document.getElementById("password").value;

fetch("/student-login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({student_id,password})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

window.location="studentdashboard.html?id="+student_id;

}
else{

document.getElementById("msg").innerText="Invalid Login";

}

});

}

</script>

</body>
</html>
